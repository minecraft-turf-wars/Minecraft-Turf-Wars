name: TurfWars
version: '${project.version}'
main: com.example.turfwars.TurfWars
api-version: '1.20'
description: A Turf Wars minigame plugin.
commands:
  turfwars:
    description: Main command for the TurfWars plugin.
    usage: /<command> <list|join> [game]
    aliases: [tw]
  permissions:
    turfwars.admin:
      description: Allows the user to force start/end TurfWars games
      default: op

